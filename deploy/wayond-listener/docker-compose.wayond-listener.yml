# GFX Wayond read-only listener — deploy SKELETON (NOT deployed in this packet).
#
# Managed service that runs `manage.py run_wayond_listener --live`. It requires an
# AGED, authorised GFX StringSession (see project-telegram-session-deauth) — do NOT
# start it until the session survives reuse. Read-only: it never sends Telegram
# messages, never downloads media bytes, and feeds only signal_intake.acquire_message.
#
# Secrets (TELEGRAM_*) MUST come from the deploy env / secret store, never committed.
# Overlay onto the prod stack:
#   docker compose -f docker-compose.yml -f deploy/wayond-listener/docker-compose.wayond-listener.yml up -d guvfx-wayond-listener

services:
  guvfx-wayond-listener:
    image: ${BACKEND_IMAGE:-guvfx-backend:latest}
    container_name: guvfx-wayond-listener
    command: >-
      python manage.py run_wayond_listener --live
    restart: unless-stopped
    environment:
      # DB (same as backend)
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      # Telegram — aged authorised session + its FROZEN device fingerprint. From the
      # secret store only; never on the CLI, never committed.
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_STRING_SESSION: ${TELEGRAM_STRING_SESSION}
      TELEGRAM_DEVICE_MODEL: ${TELEGRAM_DEVICE_MODEL:-Desktop}
      TELEGRAM_SYSTEM_VERSION: ${TELEGRAM_SYSTEM_VERSION:-Windows 10}
      TELEGRAM_APP_VERSION: ${TELEGRAM_APP_VERSION:-4.16.8}
    # Telethon is NOT in the base image — install it in the listener image build, or:
    #   pip install -r backend/requirements-telegram.txt
    # No ports exposed. No volumes. Egress should be a consistent, non-datacenter IP
    # where feasible (project-telegram-session-deauth).
    depends_on:
      - db
